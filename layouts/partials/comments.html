{{- $endpoint := .Site.Params.formspree.endpoint | default "https://formspree.io/f/YOUR_FORM_ID" -}}

<section class="comment-terminal" id="comments" aria-labelledby="comment-terminal-title">
  <div class="comment-title" id="comment-terminal-title">--- comments section ---</div>

  <form class="comment-form" action="{{ $endpoint }}" method="POST">
    <input type="hidden" name="page_url" value="{{ .Permalink }}">
    <input type="hidden" name="page_title" value="{{ .Title }}">
    <input type="hidden" name="timestamp" class="comment-timestamp">
    <input type="text" name="_gotcha" class="comment-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">

    <label>
      <span>nickname / optional</span>
      <input type="text" name="name" placeholder="anonymous" autocomplete="name">
    </label>

    <label>
      <span>email / optional</span>
      <input type="email" name="email" placeholder="optional, only visible to site owner" autocomplete="email">
    </label>

    <label>
      <span>comment *</span>
      <textarea name="comment" rows="5" required placeholder="anonymous comments are welcome..."></textarea>
    </label>

    <p class="comment-hint">
      Nickname and email are optional. Anonymous comments are OK. Comments are delivered to the site owner by email via Formspree.
    </p>

    <button type="submit" class="comment-submit">submit</button>
  </form>
</section>

<link rel="stylesheet" href="{{ "css/comments.css" | relURL }}">
<script src="{{ "js/comments.js" | relURL }}" defer></script>
