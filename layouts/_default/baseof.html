<!doctype html>
<html lang="{{ site.Language.LanguageCode | default "zh-cn" }}" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="https://litwei.fun/">{{ site.Title }}</a>
    <nav class="nav" aria-label="main navigation">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>

  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <span>© {{ now.Format "2006" }} {{ site.Params.author }}</span>
  </footer>

  <a class="admin-floating-link" href="https://litwei.fun/admin/comments.html" rel="nofollow" aria-label="comment admin">admin</a>
</body>
</html>
